name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    outputs:
      previous_sha: ${{ steps.get_previous_sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          submodules: true
          lfs: false

      - name: Get previous commit SHA
        id: get_previous_sha
        run: echo "sha=$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Build and Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_HILL_0F87A3A10 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/MealWiz/MauiWASM"
          api_location: ""
          output_location: "wwwroot"

  apply_migrations:
    needs: build_and_deploy
    runs-on: ubuntu-latest
    name: Apply db migrations
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.PRODUCTION_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase link --project-ref $SUPABASE_PROJECT_ID
      - run: supabase db push

  rollback_deployment:
    needs: [build_and_deploy, apply_migrations]
    if: needs.build_and_deploy.result == 'success' && needs.apply_migrations.result == 'failure'
    runs-on: ubuntu-latest
    name: Rollback deployment
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.build_and_deploy.outputs.previous_sha }}
          fetch-depth: 1
          submodules: true
          lfs: false

      - name: Rollback to previous deployment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_HILL_0F87A3A10 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/MealWiz/MauiWASM"
          api_location: ""
          output_location: "wwwroot"

  close_pull_request_job:
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_HILL_0F87A3A10 }}
          action: "close"
